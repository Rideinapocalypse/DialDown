<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DialDown – The CC Community</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0e0f13;
    --bg2: #16181f;
    --bg3: #1e2029;
    --border: #2a2d38;
    --accent: #ff5f1f;
    --accent2: #ff8c55;
    --green: #3ddc84;
    --blue: #4f9eff;
    --purple: #a78bfa;
    --yellow: #fbbf24;
    --text: #e8eaf0;
    --text2: #8b90a7;
    --text3: #555a72;
    --card-hover: #1a1d26;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(14,15,19,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .logo-text span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .role-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .role-badge:hover { border-color: var(--accent); }
  .role-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 8px 18px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  /* JOKE BAR */
  .joke-bar {
    background: linear-gradient(90deg, #1a0f07 0%, #1e1208 50%, #1a0f07 100%);
    border-bottom: 1px solid #3a2010;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }

  .joke-bar::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
  }

  .joke-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
    font-weight: 500;
  }

  .joke-text {
    font-size: 13.5px;
    color: #d4a87a;
    font-style: italic;
    flex: 1;
    transition: opacity 0.4s;
  }

  .joke-next {
    background: none;
    border: 1px solid #3a2010;
    color: var(--accent2);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    white-space: nowrap;
  }
  .joke-next:hover { border-color: var(--accent); background: rgba(255,95,31,0.08); }

  /* LAYOUT */
  .layout {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 24px;
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 24px;
    position: relative;
    z-index: 1;
  }

  /* FEED */
  .feed-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .feed-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
  }

  .sort-tabs {
    display: flex;
    gap: 4px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
  }

  .sort-tab {
    padding: 5px 12px;
    border-radius: 5px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    color: var(--text2);
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
  }

  .sort-tab.active {
    background: var(--bg3);
    color: var(--text);
  }

  /* POST CARD */
  .post-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 10px;
    display: flex;
    gap: 14px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    animation: fadeUp 0.4s ease both;
  }

  .post-card:hover {
    border-color: #3e4155;
    background: var(--card-hover);
    transform: translateY(-1px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* VOTE */
  .vote-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 36px;
  }

  .vote-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    font-size: 16px;
    transition: background 0.15s, color 0.15s;
    color: var(--text3);
    line-height: 1;
  }

  .vote-btn:hover { background: var(--bg3); color: var(--text); }
  .vote-btn.up.voted { color: var(--accent); }
  .vote-btn.down.voted { color: var(--blue); }

  .vote-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
  }

  /* POST CONTENT */
  .post-body { flex: 1; min-width: 0; }

  .post-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }

  .role-tag {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.3px;
  }

  .role-agent { background: rgba(79,158,255,0.15); color: var(--blue); }
  .role-tl { background: rgba(167,139,250,0.15); color: var(--purple); }
  .role-qa { background: rgba(251,191,36,0.15); color: var(--yellow); }
  .role-wfm { background: rgba(61,220,132,0.15); color: var(--green); }
  .role-trainer { background: rgba(255,95,31,0.15); color: var(--accent2); }
  .role-manager { background: rgba(255,95,31,0.2); color: var(--accent); }
  .role-it { background: rgba(100,200,200,0.15); color: #5dd6d6; }
  .role-back { background: rgba(180,180,100,0.15); color: #d4d47a; }

  .post-author {
    font-size: 12px;
    color: var(--text3);
  }

  .post-time {
    font-size: 12px;
    color: var(--text3);
    margin-left: auto;
  }

  .post-title {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 15.5px;
    line-height: 1.4;
    margin-bottom: 6px;
    color: var(--text);
  }

  .post-preview {
    font-size: 13.5px;
    color: var(--text2);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .post-footer {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: 10px;
  }

  .post-action {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12.5px;
    color: var(--text3);
    cursor: pointer;
    padding: 3px 6px;
    border-radius: 4px;
    transition: background 0.15s, color 0.15s;
  }

  .post-action:hover { background: var(--bg3); color: var(--text2); }

  /* SIDEBAR */
  .sidebar { display: flex; flex-direction: column; gap: 16px; }

  .sidebar-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .sidebar-card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sidebar-card-body { padding: 14px 16px; }

  .role-list { display: flex; flex-direction: column; gap: 8px; }

  .role-item {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid transparent;
    transition: background 0.15s, border-color 0.15s;
    font-size: 13.5px;
  }

  .role-item:hover { background: var(--bg3); border-color: var(--border); }
  .role-item.selected { background: var(--bg3); border-color: var(--accent); }
  .role-item.selected .role-item-name { color: var(--accent); }

  .role-item-icon { font-size: 18px; }
  .role-item-name { font-weight: 500; flex: 1; }
  .role-item-count { font-size: 12px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .stat-item {
    background: var(--bg3);
    border-radius: 8px;
    padding: 10px 12px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--accent);
  }

  .stat-label {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
  }

  .trending-list { display: flex; flex-direction: column; gap: 6px; }

  .trending-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    font-size: 13px;
    color: var(--text2);
    border: 1px solid transparent;
  }

  .trending-item:hover { background: var(--bg3); color: var(--text); }
  .trending-item.active { background: rgba(255,95,31,0.08); border-color: rgba(255,95,31,0.3); color: var(--accent2); }
  .trending-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    min-width: 16px;
  }

  /* ACTIVE FILTER BAR */
  .filter-bar {
    display: none;
    align-items: center;
    gap: 10px;
    background: rgba(255,95,31,0.07);
    border: 1px solid rgba(255,95,31,0.2);
    border-radius: 8px;
    padding: 8px 14px;
    margin-bottom: 14px;
    font-size: 13px;
    color: var(--accent2);
  }
  .filter-bar.visible { display: flex; }
  .filter-bar-tag { font-weight: 600; }
  .filter-bar-clear {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 13px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }
  .filter-bar-clear:hover { color: var(--text); background: var(--bg3); }

  .tag-chip {
    display: inline-block;
    background: rgba(255,95,31,0.12);
    color: var(--accent2);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    margin-right: 4px;
    cursor: pointer;
  }
  .tag-chip:hover { background: rgba(255,95,31,0.22); }

  /* MODAL OVERLAY */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 100%;
    max-width: 580px;
    animation: modalIn 0.25s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 17px;
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }

  .modal-close:hover { color: var(--text); background: var(--bg3); }

  .modal-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 14px; }

  .form-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text2);
    margin-bottom: 6px;
  }

  .form-input, .form-textarea, .form-select {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    transition: border-color 0.2s;
    outline: none;
  }

  .form-input:focus, .form-textarea:focus, .form-select:focus {
    border-color: var(--accent);
  }

  .form-textarea { resize: vertical; min-height: 100px; line-height: 1.6; }
  .form-select option { background: var(--bg3); }

  .modal-footer {
    padding: 14px 22px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }

  .btn-ghost {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: var(--radius);
    padding: 8px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-ghost:hover { border-color: var(--text2); color: var(--text); }

  /* ROLE PICKER MODAL */
  .role-picker-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    max-height: 400px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .role-pick-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
  }

  .role-pick-btn:hover { border-color: var(--accent); background: rgba(255,95,31,0.05); }
  .role-pick-icon { font-size: 22px; }
  .role-pick-name { font-weight: 500; font-size: 13.5px; }
  .role-pick-desc { font-size: 11.5px; color: var(--text3); margin-top: 2px; }

  /* EMPTY / LOADING */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text3);
  }
  .empty-state-icon { font-size: 40px; margin-bottom: 12px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">📞</div>
    <div class="logo-text">Dial<span>Down</span></div>
  </div>
  <div class="header-right">
    <div class="role-badge" onclick="openRolePicker()">
      <div class="role-dot"></div>
      <span id="headerRole">Pick your role</span>
    </div>
    <button class="btn-primary" onclick="openPostModal()">+ New Post</button>
  </div>
</header>

<!-- JOKE BAR -->
<div class="joke-bar">
  <span class="joke-label">☎ CC Joke</span>
  <span class="joke-text" id="jokeText">Loading...</span>
  <button class="joke-next" onclick="nextJoke()">Next ↻</button>
</div>

<!-- MAIN LAYOUT -->
<div class="layout">

  <!-- FEED -->
  <main>
    <div class="feed-header">
      <div class="feed-title" id="feedTitle">Community Feed</div>
      <div class="sort-tabs">
        <button class="sort-tab active" onclick="setSort(this,'hot')">🔥 Hot</button>
        <button class="sort-tab" onclick="setSort(this,'new')">✨ New</button>
        <button class="sort-tab" onclick="setSort(this,'top')">👑 Top</button>
      </div>
    </div>

    <div class="filter-bar" id="filterBar">
      <span>📌 Showing posts tagged</span>
      <span class="filter-bar-tag" id="filterBarTag"></span>
      <button class="filter-bar-clear" onclick="clearTagFilter()">✕ Clear filter</button>
    </div>

    <div id="feed"></div>
  </main>

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- Role filter -->
    <div class="sidebar-card">
      <div class="sidebar-card-header">🎯 Browse by Role</div>
      <div class="sidebar-card-body">
        <div class="role-list" id="roleFilterList"></div>
      </div>
    </div>

    <!-- Stats -->
    <div class="sidebar-card">
      <div class="sidebar-card-header">📊 Community Stats</div>
      <div class="sidebar-card-body">
        <div class="stats-grid">
          <div class="stat-item"><div class="stat-num">4.2k</div><div class="stat-label">Members</div></div>
          <div class="stat-item"><div class="stat-num">891</div><div class="stat-label">Posts Today</div></div>
          <div class="stat-item"><div class="stat-num">12k</div><div class="stat-label">Tips Shared</div></div>
          <div class="stat-item"><div class="stat-num">99%</div><div class="stat-label">AHT Stress</div></div>
        </div>
      </div>
    </div>

    <!-- Trending tags -->
    <div class="sidebar-card">
      <div class="sidebar-card-header">📈 Trending</div>
      <div class="sidebar-card-body">
        <div class="trending-list" id="trendingList"></div>
      </div>
    </div>

  </aside>
</div>

<!-- POST MODAL -->
<div class="modal-overlay" id="postModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Share your know-how</div>
      <button class="modal-close" onclick="closePostModal()">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <div class="form-label">Your Role</div>
        <select class="form-select" id="postRole">
          <option value="">Select your role...</option>
        </select>
      </div>
      <div>
        <div class="form-label">Title</div>
        <input class="form-input" id="postTitle" placeholder="What's on your mind? Tips, rants, wins..."/>
      </div>
      <div>
        <div class="form-label">Body</div>
        <textarea class="form-textarea" id="postBody" placeholder="Share the full story or know-how..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closePostModal()">Cancel</button>
      <button class="btn-primary" onclick="submitPost()">Post It 🚀</button>
    </div>
  </div>
</div>

<!-- ROLE PICKER MODAL -->
<div class="modal-overlay" id="roleModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">What's your role in CC?</div>
      <button class="modal-close" onclick="closeRolePicker()">✕</button>
    </div>
    <div class="modal-body">
      <div class="role-picker-grid" id="rolePickerGrid"></div>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────

const ROLES = [
  { id: 'agent-inbound',  icon: '🎧', name: 'Inbound Agent',    desc: 'Handling the chaos daily',       cls: 'role-agent'   },
  { id: 'agent-outbound', icon: '📲', name: 'Outbound Agent',   desc: 'Dialing for dollars (or doom)',  cls: 'role-agent'   },
  { id: 'team-lead',      icon: '🦁', name: 'Team Lead / TL',   desc: 'Sandwich between all sides',     cls: 'role-tl'      },
  { id: 'qa',             icon: '🔍', name: 'QA Analyst',        desc: 'The grammar police',             cls: 'role-qa'      },
  { id: 'wfm',            icon: '📅', name: 'WFM Analyst',       desc: 'Master of the schedule matrix', cls: 'role-wfm'     },
  { id: 'trainer',        icon: '🎓', name: 'Trainer',           desc: 'Teaching scripts since forever', cls: 'role-trainer' },
  { id: 'ops-manager',    icon: '📊', name: 'Ops Manager',       desc: 'The dashboard whisperer',        cls: 'role-manager' },
  { id: 'it-support',     icon: '🖥',  name: 'IT Support',        desc: 'Have you tried turning it off?', cls: 'role-it'     },
  { id: 'back-office',    icon: '📂', name: 'Back Office',       desc: 'Tickets and tranquility',        cls: 'role-back'    },
  { id: 'supervisor',     icon: '🧑‍💼', name: 'Supervisor',      desc: 'Approving breaks, denying feels', cls: 'role-tl'   },
  { id: 'csat-analyst',   icon: '⭐', name: 'CSAT Analyst',      desc: 'Guarding the score',             cls: 'role-qa'      },
  { id: 'escalation',     icon: '🚨', name: 'Escalation Desk',   desc: 'Where calls go to die or fly',   cls: 'role-manager' },
];

const JOKES = [
  "Why did the agent put the customer on hold? To finally finish that one cup of coffee.",
  "What do you call a WFM analyst on vacation? A myth.",
  "My AHT was so high today, the supervisor asked if I was running a therapy clinic.",
  "QA: 'You said uh twice.' Agent: 'Uh... sorry.'",
  "Why don't call center agents ever get lost? Because they always follow the script.",
  "A customer told me to 'have a nice day.' First kind words I've heard since onboarding.",
  "What's the call center diet? You eat during wrap time and drink during hold.",
  "WFM gave us 15 minutes for lunch. The microwave takes 2. Math was never their strength.",
  "Why did the TL cross the road? To get away from the escalation queue.",
  "Customer: 'I want to speak to a human.' Agent: 'Same, honestly.'",
  "Our CSAT score dropped because a customer gave us 4/5. Said it was 'almost perfect.' Sleep tight.",
  "Trainer: 'Any questions?' Agent: 'Yes. Why?'",
  "We have great work-life balance. We work hard so we can cry from the comfort of home.",
  "What's an outbound agent's favourite movie? Dial Hard.",
  "IT fixed the headsets. Only took 3 tickets and a prayer to the server room.",
];

const TRENDING_TAGS = [
  { tag: 'AHTsurvivor',    emoji: '⏱' },
  { tag: 'QAfeedback',     emoji: '🔍' },
  { tag: 'SilentCalls',    emoji: '🔇' },
  { tag: 'WFMwoes',        emoji: '📅' },
  { tag: 'ScriptKiller',   emoji: '📋' },
  { tag: 'HoldMusicPTSD',  emoji: '🎵' },
];

const SEED_POSTS = [
  { id: 1,  role: 'agent-inbound',  author: 'queenOfHolds',     tags: ['AHTsurvivor'],   title: 'My proven trick to de-escalate an irate customer in under 60 seconds', body: 'After 6 years of inbound I figured out one thing: let them finish. Fully. Don\'t interrupt. Most people just want to feel heard. Then mirror their words back and they instantly calm down. Works 80% of the time.', votes: 312, comments: 47, time: '2h ago' },
  { id: 2,  role: 'qa',             author: 'gradeAGrammar',    tags: ['QAfeedback'],    title: 'Stop writing "I understand your frustration" — here\'s what actually scores better', body: 'QA perspective: that phrase is so overused it reads as scripted. Try "That sounds genuinely stressful — let me look into this right now" instead. Specificity > sympathy clichés.', votes: 278, comments: 63, time: '4h ago' },
  { id: 3,  role: 'wfm',            author: 'scheduleGod',      tags: ['WFMwoes'],       title: 'How I built a shrinkage buffer that my TLs actually believe in', body: 'Spent 3 months tracking unplanned aux vs planned. Built a simple Excel model that shows the gap visually. Once leadership could SEE the data it went from "you\'re overstaffing" to "can we do this monthly?"', votes: 189, comments: 29, time: '5h ago' },
  { id: 4,  role: 'team-lead',      author: 'burnoutTL',        tags: ['AHTsurvivor','QAfeedback'], title: 'How do you handle an agent whose CSAT is great but AHT is through the roof?', body: 'One of my best agents gets consistently 4.8+ CSAT but her AHT is 2x the team average. Customers love her. Numbers hate her. Management is on my case. Anyone been here?', votes: 156, comments: 88, time: '6h ago' },
  { id: 5,  role: 'trainer',        author: 'slidedecksurvivor',tags: ['ScriptKiller'],  title: '5 onboarding modules I ditched and what I replaced them with', body: 'The traditional 3-day product knowledge dump is dead on arrival. New agents retain maybe 20%. I switched to scenario-based learning on day 1 and live call listening from day 2. Retention jumped.', votes: 241, comments: 34, time: '8h ago' },
  { id: 6,  role: 'escalation',     author: 'lastResort99',     tags: ['ScriptKiller'],  title: 'The exact words I use when a customer demands a manager and there is no manager', body: 'I am the escalation desk. When customers ask for "someone above you" I say: "I\'m the specialist team your call was escalated to — let me see what I can resolve for you today." Reframes it completely.', votes: 334, comments: 71, time: '10h ago' },
  { id: 7,  role: 'agent-outbound', author: 'dialerDreams',     tags: ['ScriptKiller'],  title: 'Outbound warm-up script that gets past gatekeepers without lying', body: 'Gatekeepers are doing their job. Don\'t trick them. I say "Hi, I\'m [name] calling for [first name only] — is this a good time?" Short, professional, personal. Gets through ~60% of the time.', votes: 175, comments: 42, time: '12h ago' },
  { id: 8,  role: 'it-support',     author: 'ctrl_alt_despair', tags: ['SilentCalls'],   title: 'CC-specific IT issues nobody documents (thread)', body: 'Starting a thread: softphone audio cutting out on Windows 11 after sleep mode. Fix: disable USB selective suspend in power settings. You\'re welcome.', votes: 290, comments: 115, time: '1d ago' },
  { id: 9,  role: 'agent-inbound',  author: 'holdQueen',        tags: ['HoldMusicPTSD'], title: 'I now hear our hold music in my dreams. Not a joke.', body: 'Three years of Vivaldi\'s Four Seasons on a 45-second loop. I hum it involuntarily at the supermarket. My therapist says it\'s a conditioned response. My supervisor says I need to improve my hold usage rate. Both are correct.', votes: 401, comments: 134, time: '1d ago' },
  { id: 10, role: 'wfm',            author: 'rosterNinja',      tags: ['WFMwoes'],       title: 'Why agents hate WFM (and what we can actually do about it)', body: 'I get it. From the agent side, WFM looks like a faceless machine that denies your leave and micro-tracks your aux. So I started doing monthly "WFM explains itself" sessions on the floor. Trust went up, unplanned absences went down by 18%.', votes: 223, comments: 57, time: '1d ago' },
  { id: 11, role: 'qa',             author: 'calibrationQueen', tags: ['QAfeedback'],    title: 'Calibration sessions are broken — here is how to fix them', body: 'If your calibration sessions end with everyone still disagreeing and no documented outcome, you don\'t have a calibration process, you have a meeting. Here\'s the 3-step framework I use that actually closes gaps between evaluators.', votes: 188, comments: 43, time: '2d ago' },
  { id: 12, role: 'agent-inbound',  author: 'auxCodePoet',      tags: ['SilentCalls'],   title: 'The art of handling a completely silent call', body: 'Silent calls are not always dead air. Sometimes it\'s someone in crisis who can\'t speak. Protocol: announce yourself twice, stay on, say "if you can hear me, press any key or stay on the line." I\'ve had 3 cases where staying on made a real difference.', votes: 567, comments: 201, time: '2d ago' },
  { id: 13, role: 'supervisor',     author: 'quietSupervisor',  tags: ['AHTsurvivor'],   title: 'Stopped pushing AHT for one month. Here\'s what happened.', body: 'Experiment: removed AHT from our daily coaching focus for 30 days. Focused only on resolution and CSAT. Result: AHT actually dropped by 4%. Turns out when agents aren\'t rushing, they resolve faster. Coaching culture matters more than metric pressure.', votes: 445, comments: 97, time: '2d ago' },
  { id: 14, role: 'trainer',        author: 'roleplayRuler',    tags: ['ScriptKiller'],  title: 'I replaced our entire script with 7 principles. Scores went up.', body: 'Scripts are training wheels. They work for week 1. After that, agents who rely on them sound robotic and perform worse under stress. I built a principles-based approach: empathy, ownership, clarity, urgency, resolution, recap, close. Agents internalize it in days.', votes: 312, comments: 88, time: '3d ago' },
  { id: 15, role: 'agent-inbound',  author: 'holdMusicHero',    tags: ['HoldMusicPTSD'], title: 'Customer asked me to "put on the music again." I nearly cried.', body: 'I had a customer — older gentleman — who said he actually enjoyed being on hold because the music reminded him of his late wife\'s favourite composer. He asked me to put him back on hold for a moment. I sat there not knowing whether to laugh or cry.', votes: 892, comments: 267, time: '3d ago' },
];

// ── STATE ─────────────────────────────────────────────────────────────────
let currentJoke = 0;
let userRole = null;
let posts = [...SEED_POSTS];
let votes = {}; // postId -> 'up'|'down'|null
let filterRole = null;
let filterTag = null;
let sortMode = 'hot';

// ── JOKES ─────────────────────────────────────────────────────────────────
function nextJoke() {
  currentJoke = (currentJoke + 1) % JOKES.length;
  const el = document.getElementById('jokeText');
  el.style.opacity = 0;
  setTimeout(() => { el.textContent = JOKES[currentJoke]; el.style.opacity = 1; }, 250);
}

// ── ROLES ─────────────────────────────────────────────────────────────────
function buildRolePicker() {
  const grid = document.getElementById('rolePickerGrid');
  grid.innerHTML = ROLES.map(r => `
    <button class="role-pick-btn" onclick="selectRole('${r.id}')">
      <span class="role-pick-icon">${r.icon}</span>
      <div>
        <div class="role-pick-name">${r.name}</div>
        <div class="role-pick-desc">${r.desc}</div>
      </div>
    </button>
  `).join('');
}

function buildRoleFilter() {
  const list = document.getElementById('roleFilterList');
  const allItem = `
    <div class="role-item ${filterRole === null ? 'selected' : ''}" onclick="setFilter(null)">
      <span class="role-item-icon">🌐</span>
      <span class="role-item-name">All Roles</span>
      <span class="role-item-count">${posts.length}</span>
    </div>
  `;
  const roleItems = ROLES.map(r => {
    const count = posts.filter(p => p.role === r.id).length;
    if (count === 0) return '';
    return `
      <div class="role-item ${filterRole === r.id ? 'selected' : ''}" onclick="setFilter('${r.id}')">
        <span class="role-item-icon">${r.icon}</span>
        <span class="role-item-name">${r.name}</span>
        <span class="role-item-count">${count}</span>
      </div>
    `;
  }).join('');
  list.innerHTML = allItem + roleItems;
}

function selectRole(id) {
  userRole = id;
  const role = ROLES.find(r => r.id === id);
  document.getElementById('headerRole').textContent = role.name;
  closeRolePicker();
  // pre-fill post modal
  const sel = document.getElementById('postRole');
  if (sel) sel.value = id;
}

function setFilter(id) {
  filterRole = id;
  buildFeed();
  buildRoleFilter();
}

function populatePostRoleSelect() {
  const sel = document.getElementById('postRole');
  sel.innerHTML = '<option value="">Select your role...</option>' +
    ROLES.map(r => `<option value="${r.id}">${r.icon} ${r.name}</option>`).join('');
  if (userRole) sel.value = userRole;
}

// ── FEED ──────────────────────────────────────────────────────────────────
function getRoleInfo(id) {
  return ROLES.find(r => r.id === id) || { icon: '👤', name: id, cls: 'role-agent' };
}

function buildFeed() {
  let filtered = [...posts];
  if (filterRole) filtered = filtered.filter(p => p.role === filterRole);
  if (filterTag)  filtered = filtered.filter(p => p.tags && p.tags.includes(filterTag));

  if (sortMode === 'hot') filtered.sort((a, b) => (b.votes + b.comments * 2) - (a.votes + a.comments * 2));
  else if (sortMode === 'new') filtered.sort((a, b) => b.id - a.id);
  else if (sortMode === 'top') filtered.sort((a, b) => b.votes - a.votes);

  // Update feed title
  const title = document.getElementById('feedTitle');
  title.textContent = filterTag ? `#${filterTag}` : 'Community Feed';

  // Update filter bar
  const bar = document.getElementById('filterBar');
  const barTag = document.getElementById('filterBarTag');
  if (filterTag) {
    bar.classList.add('visible');
    barTag.textContent = `#${filterTag}`;
  } else {
    bar.classList.remove('visible');
  }

  const feed = document.getElementById('feed');

  if (filtered.length === 0) {
    feed.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📭</div><p>No posts tagged #${filterTag || 'here'} yet. Be the first!</p></div>`;
    return;
  }

  feed.innerHTML = filtered.map((p, i) => {
    const role = getRoleInfo(p.role);
    const myVote = votes[p.id] || null;
    const tagChips = (p.tags || []).map(t =>
      `<span class="tag-chip" onclick="setTagFilter('${t}')">#${t}</span>`
    ).join('');
    return `
      <div class="post-card" style="animation-delay:${i * 0.05}s">
        <div class="vote-col">
          <button class="vote-btn up ${myVote === 'up' ? 'voted' : ''}" onclick="vote(event,${p.id},'up')">▲</button>
          <span class="vote-count">${p.votes + (myVote === 'up' ? 1 : myVote === 'down' ? -1 : 0)}</span>
          <button class="vote-btn down ${myVote === 'down' ? 'voted' : ''}" onclick="vote(event,${p.id},'down')">▼</button>
        </div>
        <div class="post-body">
          <div class="post-meta">
            <span class="role-tag ${role.cls}">${role.icon} ${role.name}</span>
            <span class="post-author">u/${p.author}</span>
            <span class="post-time">${p.time}</span>
          </div>
          <div class="post-title">${p.title}</div>
          <div class="post-preview">${p.body}</div>
          <div class="post-footer">
            <span class="post-action">💬 ${p.comments} comments</span>
            <span class="post-action">🔗 Share</span>
            <span class="post-action">🔖 Save</span>
            <span style="margin-left:auto">${tagChips}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// ── TRENDING ──────────────────────────────────────────────────────────────
function buildTrending() {
  const list = document.getElementById('trendingList');
  list.innerHTML = TRENDING_TAGS.map((t, i) => {
    const count = posts.filter(p => p.tags && p.tags.includes(t.tag)).length;
    const active = filterTag === t.tag ? 'active' : '';
    return `
      <div class="trending-item ${active}" onclick="setTagFilter('${t.tag}')">
        <span class="trending-num">${i + 1}</span>
        <span>${t.emoji}</span>
        <span style="flex:1">#${t.tag}</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3)">${count}</span>
      </div>
    `;
  }).join('');
}

function setTagFilter(tag) {
  filterTag = filterTag === tag ? null : tag; // toggle
  buildFeed();
  buildTrending();
  // scroll to top of feed smoothly
  document.querySelector('main').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function clearTagFilter() {
  filterTag = null;
  buildFeed();
  buildTrending();
}

function vote(e, id, dir) {
  e.stopPropagation();
  if (votes[id] === dir) votes[id] = null;
  else votes[id] = dir;
  buildFeed();
}

function setSort(btn, mode) {
  document.querySelectorAll('.sort-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  sortMode = mode;
  buildFeed();
}

// ── POST MODAL ────────────────────────────────────────────────────────────
function openPostModal() {
  populatePostRoleSelect();
  document.getElementById('postModal').classList.add('open');
}

function closePostModal() {
  document.getElementById('postModal').classList.remove('open');
  document.getElementById('postTitle').value = '';
  document.getElementById('postBody').value = '';
}

function submitPost() {
  const role = document.getElementById('postRole').value;
  const title = document.getElementById('postTitle').value.trim();
  const body = document.getElementById('postBody').value.trim();
  if (!role || !title) { alert('Please select a role and add a title.'); return; }
  const newPost = {
    id: Date.now(),
    role,
    author: userRole ? 'you' : 'anon',
    title,
    body: body || '',
    votes: 1,
    comments: 0,
    time: 'just now'
  };
  posts.unshift(newPost);
  sortMode = 'new';
  document.querySelectorAll('.sort-tab').forEach((t, i) => t.classList.toggle('active', i === 1));
  closePostModal();
  buildFeed();
  buildRoleFilter();
  buildTrending();
}

// ── ROLE PICKER MODAL ─────────────────────────────────────────────────────
function openRolePicker() { document.getElementById('roleModal').classList.add('open'); }
function closeRolePicker() { document.getElementById('roleModal').classList.remove('open'); }

// Close on overlay click
document.getElementById('postModal').addEventListener('click', function(e) {
  if (e.target === this) closePostModal();
});
document.getElementById('roleModal').addEventListener('click', function(e) {
  if (e.target === this) closeRolePicker();
});

// ── INIT ──────────────────────────────────────────────────────────────────
document.getElementById('jokeText').textContent = JOKES[0];
buildRolePicker();
buildRoleFilter();
buildTrending();
buildFeed();

// Auto-cycle jokes every 20s
setInterval(nextJoke, 20000);

// Open role picker on first visit
setTimeout(() => openRolePicker(), 600);
</script>
</body>
</html>
